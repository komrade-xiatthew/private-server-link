<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PocusHocus.io</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English+SC&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- JOIN -->
<div id="joinScreen">
  <a id="discord-btn" href="https://discord.gg/F7Kt742C7V" target="_blank" rel="noopener noreferrer" title="Join our Discord">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 127.14 96.36" width="24" height="24" fill="currentColor">
      <path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1A105.25,105.25,0,0,0,126.6,80.22h0C129.24,52.84,122.09,29.11,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.25,60,73.25,53s5-12.74,11.44-12.74S96.23,46,96.12,53,91.08,65.69,84.69,65.69Z"/>
    </svg>
    <span>Join our Discord server!</span>
  </a>
  <a id="class-desc-btn" href="https://github.com/komrade-xiatthew/class-description-markdown/blob/main/Readme.md" target="_blank" rel="noopener noreferrer" title="Class Reference">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm-1 1.5L18.5 9H13V3.5zM6 20V4h5v7h7v9H6zm2-7h8v1.5H8V13zm0 3h8v1.5H8V16zm0-6h3v1.5H8V10z"/>
    </svg>
    <span>Class Descriptions</span>
  </a>
  <div class="join-container">
    <input id="name-input" type="text" placeholder="Your name..." maxlength="16" />
    <input id="code-input" type="password" placeholder="Code" maxlength="32" />
    <select id="session-select">
      <option value="0">Session 0 - FFA</option>
      <option value="1">Session 1 - TDM</option>
      <option value="2">Session 2 - Capture Points</option>
      <option value="3">Session 3 - Boss Fight Testing Room</option>
      <option value="4">Session 4 - Practice 1 (Training Dummy)</option>
      <option value="5">Session 5 - Practice 2</option>
    </select>
    <select id="team-select" style="display:none">
      <option value="0">Team 0</option>
      <option value="1">Team 1</option>
    </select>
    <button id="join-btn" disabled>Begin</button>
    <div class="class-selector">
      <div class="class-card" data-class="fire" style="--glow:#ff6633">
        <div class="icon">🔥</div><div class="label">FIRE</div>
      </div>
      <div class="class-card" data-class="ice" style="--glow:#88ddff">
        <div class="icon">❄️</div><div class="label">ICE</div>
      </div>
      <div class="class-card" data-class="earth" style="--glow:#aabb66">
        <div class="icon">🪨</div><div class="label">EARTH</div>
      </div>
      <div class="class-card" data-class="blood" style="--glow:#ff3355">
        <div class="icon">🩸</div><div class="label">BLOOD</div>
      </div>
      <div class="class-card" data-class="lightning" style="--glow:#ffee44">
        <div class="icon">⚡</div><div class="label">LIGHTNING</div>
      </div>
      <div class="class-card" data-class="void" style="--glow:#cc66ff">
        <div class="icon">🔮</div><div class="label">VOID</div>
      </div>
      <div class="class-card" data-class="crusader" style="--glow:#ffffff">
        <div class="icon"><img src="assets/Cross.png" style="width:36px;height:36px;object-fit:contain;"></div><div class="label">CRUSADER</div>
      </div>
    </div>
    <button id="spectate-btn">Spectate</button>
  </div>
</div>

<!-- GAME -->
<div id="gameScreen"></div>
<div id="loadingScreen">Loading: <span id="loadingPct">0</span>%</div>

<!-- CHAT -->
<div id="chatBox">
  <div id="chatInputRow">
    <input id="chatInput" type="text" placeholder="Say something..." maxlength="200" autocomplete="off" />
  </div>
</div>

<!-- SESSION COUNTS PANEL -->
<div id="session-counts-panel">
  <div id="session-counts-title">Session Player Counts:</div>
</div>

<!-- DEBUG OVERLAY -->
<div id="debug-overlay">
  <div class="debug-line info" id="dbg-ws">⬤ WebSocket: connecting...</div>
  <div class="debug-line info" id="dbg-id">⬤ Session ID: waiting...</div>
  <div class="debug-line info" id="dbg-players">⬤ Players: 0</div>
  <div class="debug-line info" id="dbg-ping">⬤ Ping: --ms</div>
  <div class="debug-line info" id="dbg-fps">⬤ FPS: --</div>
</div>

<!-- DEATH -->
<div id="deathScreen">
  <h2>YOU DIED</h2>
  <p id="death-msg"></p>
  <button id="respawn-btn">Play Again</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.4.2/pixi.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pixi-filters@5.4.1/dist/pixi-filters.js"></script>
<script src="game.js"></script>
</body>
</html>
